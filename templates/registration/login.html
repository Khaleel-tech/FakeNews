{% extends 'base.html' %}
{% block title %}Login | TruthLens{% endblock %}
{% block content %}
<section class="auth-card">
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Sign In</button>
  </form>
  <p>Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
</section>
{% endblock %}
