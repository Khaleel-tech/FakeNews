{% extends 'base.html' %}
{% block title %}Register | TruthLens{% endblock %}
{% block content %}
<section class="auth-card">
  <h2>Create Account</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Create Account</button>
  </form>
  <p>Already have an account? <a href="{% url 'login' %}">Login</a>.</p>
</section>
{% endblock %}
